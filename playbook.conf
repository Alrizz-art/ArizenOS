<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>ArizenOS</Name>
    <Username>ArizenOS</Username>
    <Title>ArizenOS v0.1.0-alpha</Title>
    <ShortDescription>Privacy-first. Developer-ready. Visually refined.</ShortDescription>
    <Description><![CDATA[ArizenOS transforms a stock Windows installation into a lightweight, secure, and aesthetically consistent desktop environment.

Designed for developers, power users, and privacy-conscious individuals who demand control over their OS without sacrificing usability.

Features:
- Privacy hardening & telemetry removal
- ArizenOS OEM branding & wallpapers
- Dark mode, transparency & visual refinements
- Performance optimizations
- Developer environment setup (optional)

Supports: Windows 10 22H2 | Windows 11 22H2, 23H2, 24H2]]></Description>
    <Details>A privacy-focused, developer-friendly Windows customization playbook delivering a clean, debloated, and branded experience.</Details>
    <Version>0.1.0</Version>
    <UniqueId>8937d134-c596-478b-a3b6-1fef09602676</UniqueId>
    <SupportedBuilds>
        <string>19045</string>
        <string>22621</string>
        <string>22631</string>
        <string>26100</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <Git>https://github.com/Alrizz-art/ArizenOS</Git>
    <ProgressText>Transforming your Windows into ArizenOS...</ProgressText>
    <EstimatedMinutes>10</EstimatedMinutes>
    <UseKernelDriver>false</UseKernelDriver>
    <ProductCode>64</ProductCode>
    <FeaturePages>
        <RadioPage IsRequired="true" DefaultOption="safe-debloat" Description="Choose how aggressively to remove pre-installed apps and telemetry.">
            <Options>
                <RadioOption>
                    <Text>Safe (Recommended) — Removes telemetry, ads, and non-essential apps</Text>
                    <Name>safe-debloat</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Minimal — Only removes telemetry and advertising components</Text>
                    <Name>minimal-debloat</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <CheckboxPage IsRequired="false" Description="Select optional features to apply during installation.">
            <Options>
                <CheckboxOption>
                    <Text>Create System Restore Point before applying changes (Recommended)</Text>
                    <Name>restore-point</Name>
                </CheckboxOption>
                <CheckboxOption>
                    <Text>Apply ArizenOS OEM Branding (System Info, About page)</Text>
                    <Name>oem-branding</Name>
                </CheckboxOption>
                <CheckboxOption>
                    <Text>Deploy ArizenOS Wallpapers (Desktop + Lock Screen)</Text>
                    <Name>wallpaper</Name>
                </CheckboxOption>
                <CheckboxOption>
                    <Text>Developer Environment (WSL2, WinGet, Git, VS Code, Node.js)</Text>
                    <Name>developer-mode</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
    </FeaturePages>
</Playbook>
