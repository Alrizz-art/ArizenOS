<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>ArizenOS</Name>
    <Username>ArizenOS</Username>
    <Title>ArizenOS v0.1.0-alpha</Title>
    <ShortDescription>Privacy-first. Developer-ready. Visually refined.</ShortDescription>
    <Description><![CDATA[ArizenOS transforms a stock Windows installation into a lightweight, secure, and aesthetically consistent desktop environment.

Designed for developers, power users, and privacy-conscious individuals who demand control over their OS without sacrificing usability.

Features:
- Privacy hardening & telemetry removal
- ArizenOS OEM branding & wallpapers
- Dark mode, transparency & visual refinements
- Performance optimizations
- Developer environment setup (optional)

Supports: Windows 10 22H2 | Windows 11 22H2, 23H2, 24H2]]></Description>
    <Details>A privacy-focused, developer-friendly Windows customization playbook delivering a clean, debloated, and branded experience.</Details>
    <Version>0.1.0</Version>
    <UniqueId>17a4cf9b-b2e5-4cfd-b738-2a3217e07bce</UniqueId>
    <SupportedBuilds>
        <string>19045</string>
        <string>22621</string>
        <string>22631</string>
        <string>26100</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <Git>https://github.com/Alrizz-art/ArizenOS</Git>
    <ProgressText>Transforming your Windows into ArizenOS...</ProgressText>
    <FeaturePages>
        <RadioPage IsRequired="true" Description="Choose how aggressively to remove pre-installed apps and telemetry.">
            <RadioOption Name="Safe (Recommended) — Removes telemetry, ads, and non-essential apps" Default="true">
                <n>safe-debloat</n>
            </RadioOption>
            <RadioOption Name="Minimal — Only removes telemetry and advertising components" Default="false">
                <n>minimal-debloat</n>
            </RadioOption>
        </RadioPage>
        <CheckboxPage IsRequired="false" Description="Select optional features to apply during installation.">
            <CheckboxOption Name="Create System Restore Point before applying changes (Recommended)" IsChecked="true">
                <n>restore-point</n>
            </CheckboxOption>
            <CheckboxOption Name="Apply ArizenOS OEM Branding (System Info, About page)" IsChecked="true">
                <n>oem-branding</n>
            </CheckboxOption>
            <CheckboxOption Name="Deploy ArizenOS Wallpapers (Desktop + Lock Screen)" IsChecked="true">
                <n>wallpaper</n>
            </CheckboxOption>
            <CheckboxOption Name="Developer Environment (WSL2, WinGet, Git, VS Code, Node.js)" IsChecked="true">
                <n>developer-mode</n>
            </CheckboxOption>
        </CheckboxPage>
    </FeaturePages>
</Playbook>
