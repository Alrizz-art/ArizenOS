# Arizen Agent Registry
# Single source of truth for all agent metadata.
# Consumed by: arizen-daemon (process management), Commander (routing),
#              HUD overlay (status display), CLI tooling.
#
# Schema:
#   [agents.<name>]
#   display      = human-readable name
#   module       = Python module path (from repo root)
#   class        = class name within module
#   autostart    = start with daemon?
#   tier         = LLM tier preference (0=rule | 1=nano | 2=standard | 3=power)
#   llm_tier     = "nano" | "standard" | "power"
#   max_restart  = max automatic restarts before alerting user
#   priority     = process scheduling priority (1=low, 5=normal, 10=critical)
#   fs_access    = may read/write filesystem (declared paths only)
#   net_access   = may make outbound HTTP (logged)
#   pipe         = named pipe endpoint this agent listens on
#   health_url   = internal health endpoint

[agents.commander]
display     = "Arizen Commander"
module      = "agents.commander.commander_agent"
class       = "CommanderAgent"
autostart   = true
tier        = 3
llm_tier    = "power"
max_restart = 10
priority    = 10
fs_access   = false
net_access  = false
pipe        = "\\\\.\\pipe\\arizen-commander"
description = "Master orchestrator. Receives all user requests. Routes to specialist agents via DAG execution."

[agents.coder]
display     = "Arizen Coder"
module      = "agents.coder.coder_agent"
class       = "CoderAgent"
autostart   = true
tier        = 2
llm_tier    = "power"
max_restart = 5
priority    = 7
fs_access   = true
net_access  = false
pipe        = "\\\\.\\pipe\\arizen-coder"
description = "Code generation, review, refactor, and test writing across Python/Rust/TypeScript."

[agents.researcher]
display     = "Arizen Researcher"
module      = "agents.researcher.researcher_agent"
class       = "ResearcherAgent"
autostart   = true
tier        = 2
llm_tier    = "standard"
max_restart = 5
priority    = 5
fs_access   = false
net_access  = true
pipe        = "\\\\.\\pipe\\arizen-researcher"
description = "Web search (local SearXNG), document retrieval, and multi-source synthesis."

[agents.fixer]
display     = "Arizen Fixer"
module      = "agents.fixer.fixer_agent"
class       = "FixerAgent"
autostart   = true
tier        = 2
llm_tier    = "power"
max_restart = 5
priority    = 8
fs_access   = true
net_access  = false
pipe        = "\\\\.\\pipe\\arizen-fixer"
description = "Error diagnosis, stack trace analysis, and patch generation with optional test verification."

[agents.devops]
display     = "Arizen DevOps"
module      = "agents.devops.devops_agent"
class       = "DevOpsAgent"
autostart   = true
tier        = 2
llm_tier    = "nano"
max_restart = 5
priority    = 6
fs_access   = true
net_access  = false
pipe        = "\\\\.\\pipe\\arizen-devops"
description = "Build pipelines, CI runs, service control, and release packaging."

[agents.security]
display     = "Arizen Security"
module      = "agents.security.security_agent"
class       = "SecurityAgent"
autostart   = true
tier        = 2
llm_tier    = "standard"
max_restart = 5
priority    = 9
fs_access   = true
net_access  = false
pipe        = "\\\\.\\pipe\\arizen-security"
description = "Static secret scanning, dependency audit, code vulnerability detection. Never auto-remediates."

[agents.designer]
display     = "Arizen Designer"
module      = "agents.designer.designer_agent"
class       = "DesignerAgent"
autostart   = false
tier        = 2
llm_tier    = "power"
max_restart = 3
priority    = 4
fs_access   = true
net_access  = false
pipe        = "\\\\.\\pipe\\arizen-designer"
description = "React/TSX component generation, design token management, and accessibility auditing."

[agents.memory]
display     = "Arizen Memory"
module      = "agents.memory.memory_agent"
class       = "MemoryAgent"
autostart   = true
tier        = 1
llm_tier    = "nano"
max_restart = 10
priority    = 10
fs_access   = true
net_access  = false
pipe        = "\\\\.\\pipe\\arizen-memory"
description = "Three-scope knowledge store (working/session/persistent). Serves context to all agents."

# ─── LLM Tier Definitions ─────────────────────────────────────────────────────
[llm_tiers]
nano     = { model = "phi3:mini",       ctx = 4096,  max_ms = 500  }
standard = { model = "mistral:7b-q4",   ctx = 8192,  max_ms = 2000 }
power    = { model = "llama3:70b-q4",   ctx = 32768, max_ms = 8000 }

# ─── Named Pipe Map ───────────────────────────────────────────────────────────
[pipes]
control    = "\\\\.\\pipe\\arizen-control"
agents     = "\\\\.\\pipe\\arizen-agents"
events     = "\\\\.\\pipe\\arizen-events"
nexus      = "\\\\.\\pipe\\arizen-nexus"
commander  = "\\\\.\\pipe\\arizen-commander"

# ─── Approval Rules ───────────────────────────────────────────────────────────
# Tools matching these patterns always prompt the user before execution.
[approval_required]
tools = [
  "filesystem.delete",
  "filesystem.move",
  "filesystem.write",
  "devops.deploy",
  "devops.service.restart",
  "security.quarantine",
  "shell.execute_arbitrary",
  "memory.forget",
]
