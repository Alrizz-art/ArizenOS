# Auto-label PRs by changed file paths
# See: https://github.com/actions/labeler

# ─── Packages ─────────────────────────────────────────────────────────────────
"pkg/core":
  - packages/core/**

"pkg/glass":
  - packages/renderer/**

"pkg/mind":
  - packages/ai/**

"pkg/shell":
  - packages/platform/**

"pkg/flow":
  - packages/animations/**

"pkg/skin":
  - packages/themes/**

"pkg/ui":
  - packages/ui/**

"pkg/widgets":
  - packages/widgets/**

"pkg/sync":
  - packages/sync/**

"pkg/agent-sdk":
  - packages/sdk/**

# ─── Apps ─────────────────────────────────────────────────────────────────────
"app/launcher":
  - apps/launcher/**

"app/assistant":
  - apps/assistant/**

"app/voice":
  - apps/voice/**

"app/hub":
  - apps/hub/**

"app/agent":
  - apps/agent/**

# ─── Cross-cutting ────────────────────────────────────────────────────────────
"area/ci":
  - .github/workflows/**
  - .github/dependabot.yml

"area/docs":
  - docs/**
  - "*.md"

"area/branding":
  - branding/**

"area/tests":
  - tests/**

"area/tools":
  - tools/**

"area/release":
  - playbook/releases/**
  - RELEASE.md
  - CHANGELOG.md

"area/governance":
  - GOVERNANCE.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - MAINTAINERS.md
