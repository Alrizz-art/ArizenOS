# GitHub Labeler Configuration
# Automatically applies labels to PRs based on changed file paths.
# Used by .github/workflows/labeler.yml

"scope: kernel":
  - changed-files:
    - any-glob-to-any-file:
      - "kernel/**"
      - "arch/**"

"scope: bootloader":
  - changed-files:
    - any-glob-to-any-file:
      - "arch/x86_64/boot/**"

"scope: drivers":
  - changed-files:
    - any-glob-to-any-file:
      - "drivers/**"

"scope: filesystem":
  - changed-files:
    - any-glob-to-any-file:
      - "fs/**"
      - "kernel/fs/**"

"scope: memory":
  - changed-files:
    - any-glob-to-any-file:
      - "kernel/mm/**"

"scope: network":
  - changed-files:
    - any-glob-to-any-file:
      - "kernel/net/**"
      - "drivers/net/**"

"scope: userspace":
  - changed-files:
    - any-glob-to-any-file:
      - "userspace/**"

"scope: build-system":
  - changed-files:
    - any-glob-to-any-file:
      - "Makefile"
      - "scripts/**"
      - "tools/toolchain/**"
      - "*.mk"

"scope: security":
  - changed-files:
    - any-glob-to-any-file:
      - "kernel/security/**"
      - "SECURITY.md"

"type: documentation":
  - changed-files:
    - any-glob-to-any-file:
      - "docs/**"
      - "*.md"
      - ".github/*.md"

"type: ci-cd":
  - changed-files:
    - any-glob-to-any-file:
      - ".github/workflows/**"
      - "scripts/ci/**"

"type: test":
  - changed-files:
    - any-glob-to-any-file:
      - "tests/**"
