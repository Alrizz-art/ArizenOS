name: "\U0001F4DC RFC (Request for Comments)"
description: Propose a significant design change, new architecture, or breaking API change.
title: "rfc: <short title>"
labels: ["rfc", "needs-discussion"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        An RFC is required for any change that:
        - Modifies or extends a public API in a breaking way
        - Introduces a new package or app
        - Changes the monorepo architecture or build pipeline
        - Has significant UX or performance implications across multiple components

        RFCs are discussed openly. They do not guarantee implementation.
        See [CONTRIBUTING.md](../CONTRIBUTING.md) for the full RFC process.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have read CONTRIBUTING.md and the RFC process.
          required: true
        - label: This change is significant enough to require an RFC (not a regular feature request).
          required: true
        - label: I searched existing RFCs — this is not a duplicate.
          required: true

  - type: input
    id: rfc-number
    attributes:
      label: Proposed RFC Number
      description: Leave blank — a maintainer will assign a number.
      placeholder: "Assigned by maintainers"
    validations:
      required: false

  - type: dropdown
    id: rfc-type
    attributes:
      label: RFC Type
      options:
        - New Feature / API
        - Breaking Change
        - Architecture / Infrastructure
        - Process / Governance
        - Deprecation
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph summary of the proposal. What is it and why does it matter?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? What use cases does it enable? Why now?
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: Detailed Design
      description: |
        The meat of the RFC. Include:
        - API shape (types, interfaces, function signatures)
        - Architecture diagrams if relevant (can use Mermaid or ASCII)
        - Implementation strategy
        - Migration path for breaking changes
    validations:
      required: true

  - type: textarea
    id: drawbacks
    attributes:
      label: Drawbacks
      description: What are the known drawbacks, risks, or tradeoffs of this proposal?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What other designs or approaches were considered? Why were they not chosen?
    validations:
      required: false

  - type: textarea
    id: unresolved
    attributes:
      label: Unresolved Questions
      description: What open questions remain? What needs to be decided before implementation begins?
    validations:
      required: false
