name: CI

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ArizenOS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cross-compiler toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            nasm \
            xorriso \
            grub-pc-bin \
            grub-common \
            qemu-system-x86 \
            mtools

      # Uncomment when build system is ready:
      # - name: Build
      #   run: make all
      #
      # - name: Upload ISO artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: arizenos-${{ github.sha }}
      #     path: build/*.iso
      #     retention-days: 7

      - name: Placeholder — build system not yet configured
        run: echo "Build step placeholder — implement when Makefile is ready"

  lint:
    name: Lint & Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check commit message convention
        if: github.event_name == 'pull_request'
        run: |
          echo "Conventional Commits check placeholder"
          # Add commitlint or similar tool here when ready

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ArizenOS v${{ steps.changelog.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
