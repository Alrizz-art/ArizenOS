name: Nightly Build

on:
  schedule:
    # Run at 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual nightly trigger"
        required: false
        default: "Manual trigger"

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  nightly-build:
    name: Nightly Build & Test
    runs-on: ubuntu-latest
    if: github.repository == 'Alrizz-art/ArizenOS'

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            nasm \
            xorriso \
            grub-pc-bin \
            grub-common \
            qemu-system-x86 \
            mtools

      - name: Build
        id: build
        run: |
          echo "Nightly build from: $(git log --oneline -1)"
          # make clean && make all
          echo "Build placeholder"

      - name: Run tests
        id: test
        run: |
          # make test
          echo "Test placeholder"

      - name: Upload nightly artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: arizenos-nightly-${{ github.run_number }}
          path: build/
          retention-days: 7

      - name: Report build status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Build failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The nightly build failed on \`develop\`.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['type: ci-cd', 'priority: high', 'status: needs-triage']
            });
