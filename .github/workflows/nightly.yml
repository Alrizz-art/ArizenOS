name: Nightly Build

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily
  workflow_dispatch:      # Manual trigger

jobs:
  nightly:
    name: Nightly — ${{ matrix.app }}
    runs-on: windows-latest
    strategy:
      matrix:
        app: [launcher, assistant, voice, hub, agent]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "8" }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck test:unit build --filter=@arizen/${{ matrix.app }}
      - name: Package nightly installer
        run: pnpm --filter @arizen/${{ matrix.app }} package:nightly
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.app }}-${{ github.run_id }}
          path: apps/${{ matrix.app }}/build/*.exe
          retention-days: 3

  tag-nightly:
    name: Tag Nightly
    needs: [nightly]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move nightly tag
        run: |
          DATE=$(date +%Y%m%d)
          git tag -f nightly-${DATE}
          git push origin nightly-${DATE} --force
          git tag -f nightly
          git push origin nightly --force

  notify-failure:
    name: Notify on Failure
    needs: [nightly]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open GitHub Issue on nightly failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly build failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The nightly build failed on ${new Date().toISOString()}.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['kind/bug', 'area/ci', 'priority/high']
            })
