name: Security

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ─── Secret Scanning ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ─── YAML Lint ───────────────────────────────────────────────────────────────
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint playbook YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            playbook.yaml \
            playbook/entries/ \
            entries/ \
            entries.yaml \
            2>&1 || true

  # ─── PowerShell Script Analysis ──────────────────────────────────────────────
  ps-lint:
    name: PowerShell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Run PSScriptAnalyzer on scripts/
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity Warning,Error
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Host "::warning::PSScriptAnalyzer found $($results.Count) issue(s)"
          } else {
            Write-Host "PSScriptAnalyzer: no issues found"
          }
        continue-on-error: true
