name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Tag Format
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - name: Parse version tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          if echo "$TAG" | grep -qE "\-(alpha|beta|rc)\.[0-9]+$"; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Releasing: $TAG"

  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: validate-tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            nasm \
            xorriso \
            grub-pc-bin \
            grub-common \
            qemu-system-x86 \
            mtools

      # Uncomment when build system is ready:
      # - name: Build kernel
      #   run: make clean && make all
      #
      # - name: Build ISO
      #   run: make iso
      #
      # - name: Compute checksums
      #   run: |
      #     sha256sum build/arizenos.iso > build/arizenos.iso.sha256
      #     sha256sum build/arizenos.elf >> build/arizenos.iso.sha256
      #     cat build/arizenos.iso.sha256

      - name: Placeholder build step
        run: |
          mkdir -p build
          echo "ArizenOS ${{ needs.validate-tag.outputs.version }}" > build/version.txt
          echo "Build system placeholder — implement Makefile targets"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: arizenos-${{ needs.validate-tag.outputs.version }}
          path: build/
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: arizenos-${{ needs.validate-tag.outputs.version }}
          path: release-artifacts/

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          # Extract the relevant section from CHANGELOG.md
          NOTES=$(awk "/## \[${VERSION#v}\]/,/## \[/" CHANGELOG.md | head -n -1)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          echo "notes<<ENDOFNOTES" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "ENDOFNOTES" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ArizenOS ${{ needs.validate-tag.outputs.version }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            **Full Changelog:** https://github.com/Alrizz-art/ArizenOS/blob/${{ needs.validate-tag.outputs.version }}/CHANGELOG.md

            **Verify download integrity:**
            ```bash
            sha256sum -c arizenos.iso.sha256
            ```
          files: |
            release-artifacts/*
          draft: false
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
