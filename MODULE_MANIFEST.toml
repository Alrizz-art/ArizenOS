# ArizenOS Module Manifest
# Machine-readable module registry.
# Every package in this repo must appear here.
# Fields: tier, lang, owner, description, deps[]

# ── TIER LEGEND ──────────────────────────────────────────────────────────────
# 0 = Foundation  (no business logic, no external deps beyond stdlib)
# 1 = Platform    (OS interfaces, IPC, runtime)
# 2 = Intelligence (AI, memory, knowledge, agents)
# 3 = Product     (user-facing features: apps, voice, playbooks)
# 4 = Support     (branding, docs, scripts)

[modules.core]
tier        = 0
lang        = "rust"
owner       = "platform"
description = "Foundational primitives: types, traits, error types, config, structured logging"
deps        = []

[modules.runtime]
tier        = 1
lang        = "rust"
owner       = "platform"
description = "Tokio daemon, process lifecycle, IPC (named pipes + gRPC), scheduler, sandbox"
deps        = ["core"]

[modules.integrations]
tier        = 1
lang        = "rust"
owner       = "platform"
description = "Windows API wrappers, LM Studio client, Ollama client, taskbar, notifications"
deps        = ["core"]

[modules.services]
tier        = 1
lang        = "rust"
owner       = "platform"
description = "Background services: file watcher, hotkey, clipboard monitor, process monitor"
deps        = ["core", "runtime"]

[modules.memory]
tier        = 2
lang        = "python"
owner       = "ai"
description = "Session, persistent (SQLite), and semantic (ChromaDB) memory stores"
deps        = ["core"]

[modules.knowledge]
tier        = 2
lang        = "python"
owner       = "ai"
description = "Knowledge vault: ingestion, chunking, embedding, hybrid search (BM25 + vector)"
deps        = ["core", "memory"]

[modules.skills]
tier        = 2
lang        = "python"
owner       = "ai"
description = "Atomic skill primitives callable by any agent: filesystem, shell, clipboard, browser"
deps        = ["core", "integrations"]

[modules.agents]
tier        = 2
lang        = "python"
owner       = "ai"
description = "Agent mesh: Monarch, Archivist, Executor, Sentinel, Weaver, Oracle"
deps        = ["core", "memory", "knowledge", "skills", "integrations"]

[modules.playbooks]
tier        = 3
lang        = "python"
owner       = "product"
description = "YAML workflow definitions, execution engine, trigger system, built-in library"
deps        = ["core", "agents", "skills"]

[modules.voice]
tier        = 3
lang        = "python"
owner       = "product"
description = "Voice pipeline: STT (Whisper), TTS, wake word, audio device management"
deps        = ["core", "agents"]

[modules.apps]
tier        = 3
lang        = "typescript+rust"
owner       = "product"
description = "User-facing apps: Command Nexus (Tauri), HUD overlay, settings panel, installer"
deps        = ["core", "runtime"]   # communicate via IPC only — no direct Python imports

[modules.branding]
tier        = 4
lang        = "none"
owner       = "design"
description = "Design tokens, assets, icons, fonts, themes — consumed by apps/"
deps        = []

[modules.docs]
tier        = 4
lang        = "markdown"
owner       = "everyone"
description = "Architecture, API specs, ADRs, guides, onboarding"
deps        = []

[modules.scripts]
tier        = 4
lang        = "powershell+bash"
owner       = "platform"
description = "Bootstrap, build, dev setup, release, packaging scripts"
deps        = []
