title: "Apply Dark Theme"
description: "Forces system-wide dark mode for all apps and the Windows shell. Sets ArizenOS deep slate accent color (#1E293B / #0F172A) across all UI surfaces including titlebar, taskbar, and Start menu."
privilege: TrustedInstaller
actions:
  - !registryImport:
      path: registry\dark-theme.reg

  - !registryValue:
      path: "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "AppsUseLightTheme"
      data: 0
      type: DWord

  - !registryValue:
      path: "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "SystemUsesLightTheme"
      data: 0
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "AppsUseLightTheme"
      data: 0
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "SystemUsesLightTheme"
      data: 0
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "ColorPrevalence"
      data: 0
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "UseWindowsDarkMode"
      data: 1
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "AccentColor"
      data: "0xFF1E293B"
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "AccentColorInactive"
      data: "0xFF0F172A"
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "ColorizationColor"
      data: "0xC41E293B"
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "EnableAeroPeek"
      data: 1
      type: DWord

  - !powerShell:
      script: |
        # Apply custom visual FX bitmask (smooth edges + thumbnails, no animation bloat)
        $mask = [byte[]](0x90,0x12,0x03,0x80,0x10,0x00,0x00,0x00)
        Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" `
          -Name "UserPreferencesMask" -Value $mask -Type Binary -Force
        Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" `
          -Name "VisualFXSetting" -Value 3 -Type DWord -Force -ErrorAction SilentlyContinue
        "[$(Get-Date -f 'yyyy-MM-dd HH:mm:ss')] [INFO] Dark theme applied" |
          Add-Content "$env:SystemDrive\ArizenOS\Logs\install.log"
