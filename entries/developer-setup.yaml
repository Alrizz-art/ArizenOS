title: "Developer Environment Setup"
description: "Installs a complete developer toolchain: WSL2, WinGet packages, Git, Node.js LTS, Python 3.12, VS Code, Docker Desktop, GitHub CLI, PowerShell 7, Starship, and configures developer-friendly OS settings. Requires internet connection."
privilege: TrustedInstaller
condition: "{{DeveloperMode}}"
actions:
  # ── Enable Developer Mode ────────────────────────────────────────
  - !registryValue:
      path: "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock"
      value: "AllowDevelopmentWithoutDevLicense"
      data: 1
      type: DWord

  # ── Windows Optional Features ────────────────────────────────────
  - !windowsFeature:
      name: "Microsoft-Windows-Subsystem-Linux"
      state: Enabled

  - !windowsFeature:
      name: "VirtualMachinePlatform"
      state: Enabled

  # ── Developer Registry Tweaks ────────────────────────────────────
  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
      value: "HideFileExt"
      data: 0
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
      value: "Hidden"
      data: 1
      type: DWord

  - !registryValue:
      path: "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem"
      value: "LongPathsEnabled"
      data: 1
      type: DWord

  # ── Disable Windows Search Indexing (SSD optimization) ──────────
  - !service:
      name: "WSearch"
      startType: Manual
      status: Stopped

  # ── Run Full Dev Setup Script ────────────────────────────────────
  - !powerShell:
      script: scripts\developer-setup.ps1
      timeout: 1800

  - !powerShell:
      script: |
        # Set WSL2 as default version (post-feature-enable)
        wsl --set-default-version 2 2>$null
        "[$(Get-Date -f 'yyyy-MM-dd HH:mm:ss')] [INFO] Developer setup complete (reboot required for WSL2)" |
          Add-Content "$env:SystemDrive\ArizenOS\Logs\install.log"
