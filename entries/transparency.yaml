title: "Enable Transparency & Acrylic Effects"
description: "Enables Windows 10 Acrylic and Windows 11 Mica transparency effects across the taskbar, Start menu, Action Center, and app titlebar regions. Includes OLED-optimized taskbar translucency."
privilege: TrustedInstaller
actions:
  - !registryImport:
      path: registry\transparency.reg

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "EnableTransparency"
      data: 1
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "EnableBlurBehind"
      data: 1
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "Composition"
      data: 1
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "GlassOpacity"
      data: 85
      type: DWord

  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\DWM"
      value: "ColorizationBlurBalance"
      data: 1
      type: DWord

  # OLED Taskbar Transparency
  - !registryValue:
      path: "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
      value: "UseOLEDTaskbarTransparency"
      data: 1
      type: DWord

  - !registryValue:
      path: "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
      value: "TaskbarTranslucent"
      data: 1
      type: DWord

  # Action Center Acrylic
  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\ImmersiveShell"
      value: "UseAcrylicSurface"
      data: 1
      type: DWord

  # Windows 11 Mica
  - !registryValue:
      path: "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
      value: "EnableMicaEffect"
      data: 1
      type: DWord

  - !powerShell:
      script: |
        "[$(Get-Date -f 'yyyy-MM-dd HH:mm:ss')] [INFO] Transparency effects applied" |
          Add-Content "$env:SystemDrive\ArizenOS\Logs\install.log"
