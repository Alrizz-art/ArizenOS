---
title: Safety Net
description: Create restore point and registry backup
actions:
  - !writeStatus: {status: 'ArizenOS — Creating system restore point...'}
  - !powerShell:
      command: '.\scripts\create-restore-point.ps1'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !writeStatus: {status: 'ArizenOS — Backing up registry...'}
  - !powerShell:
      command: '.\scripts\backup-registry.ps1 -OutputPath "$env:APPDATA\ArizenOS\backup\registry-backup.reg"'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !writeStatus: {status: 'ArizenOS — Safety net created'}
