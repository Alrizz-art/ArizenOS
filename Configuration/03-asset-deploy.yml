---
title: Deploy Assets
description: Copy ArizenOS branding assets to system directories
actions:
  - !writeStatus: {status: 'ArizenOS — Deploying branding assets...'}
  - !powerShell:
      command: '.\scripts\deploy-assets.ps1 -Action CreateDirs'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !cmd:
      command: 'copy /Y ".\assets\logos\arizenOS_logo_oem.bmp" "%ProgramData%\ArizenOS\branding\oemlogo.bmp"'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !cmd:
      command: 'copy /Y ".\assets\wallpapers\arizenOS_dark.jpg" "%ProgramData%\ArizenOS\wallpapers\arizenOS_dark.jpg"'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !cmd:
      command: 'copy /Y ".\assets\wallpapers\arizenOS_default.jpg" "%ProgramData%\ArizenOS\wallpapers\arizenOS_default.jpg"'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !cmd:
      command: 'copy /Y ".\assets\wallpapers\arizenOS_lockscreen.jpg" "%ProgramData%\ArizenOS\wallpapers\arizenOS_lockscreen.jpg"'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !writeStatus: {status: 'ArizenOS — Assets deployed'}
