---
title: Visual Theme
description: Apply ArizenOS dark theme and wallpaper
actions:
  - !writeStatus: {status: 'ArizenOS — Applying visual theme...'}
  - !powerShell:
      command: '.\scripts\apply-theme.ps1'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !registryValue:
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      value: 'AppsUseLightTheme'
      data: '0'
      type: REG_DWORD
  - !registryValue:
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      value: 'SystemUsesLightTheme'
      data: '0'
      type: REG_DWORD
  - !registryValue:
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      value: 'ColorPrevalence'
      data: '0'
      type: REG_DWORD
  - !writeStatus: {status: 'ArizenOS — Visual theme applied'}
