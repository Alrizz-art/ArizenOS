---
title: Lock Screen
description: Set ArizenOS lock screen wallpaper and disable Spotlight
actions:
  - !writeStatus: {status: 'ArizenOS — Configuring lock screen...'}
  - !powerShell:
      command: '.\scripts\apply-wallpaper.ps1 -Target LockScreen'
      exeDir: true
      wait: true
      runas: currentUserElevated
  - !registryValue:
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Personalization'
      value: 'LockScreenImage'
      data: '%ProgramData%\ArizenOS\wallpapers\arizenOS_lockscreen.jpg'
      type: REG_SZ
  - !registryValue:
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Personalization'
      value: 'NoLockScreen'
      data: '0'
      type: REG_DWORD
  - !writeStatus: {status: 'ArizenOS — Lock screen configured'}
