title: Finalize and Cleanup
actions:
  # ── Performance Registry ──────────────────────────────────────────
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\FileSystem', value: 'NtfsDisableLastAccessUpdate', type: REG_DWORD, data: '2147483651'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'NetworkThrottlingIndex', type: REG_DWORD, data: '4294967295'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'SystemResponsiveness', type: REG_DWORD, data: '0'}
  # ── Security Audit ────────────────────────────────────────────────
  - !powerShell:
      exeDir: true
      wait: true
      command: '& ".\Executables\security-audit.ps1"'
  # ── Restart Explorer to apply theme ──────────────────────────────
  - !powerShell:
      wait: true
      command: >-
        Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue;
        Start-Sleep -Seconds 2;
        Start-Process explorer
