title: Deploy ArizenOS Wallpapers
actions:
  - !cmd:
      command: 'mkdir "C:\ArizenOS\Wallpapers" 2>nul'
      wait: true
  - !cmd:
      command: 'xcopy /Y /Q "Executables\assets\wallpapers\arizenOS_default.jpg" "C:\ArizenOS\Wallpapers\" >nul 2>&1'
      wait: true
      exeDir: true
  - !cmd:
      command: 'xcopy /Y /Q "Executables\assets\wallpapers\arizenOS_lockscreen.jpg" "C:\ArizenOS\Wallpapers\" >nul 2>&1'
      wait: true
      exeDir: true
  - !cmd:
      command: 'xcopy /Y /Q "Executables\assets\wallpapers\arizenOS_dark.jpg" "C:\ArizenOS\Wallpapers\" >nul 2>&1'
      wait: true
      exeDir: true
  - !registryValue: {path: 'HKCU\Control Panel\Desktop', value: 'Wallpaper', type: REG_SZ, data: 'C:\ArizenOS\Wallpapers\arizenOS_default.jpg'}
  - !registryValue: {path: 'HKCU\Control Panel\Desktop', value: 'WallpaperStyle', type: REG_SZ, data: '10'}
  - !registryValue: {path: 'HKCU\Control Panel\Desktop', value: 'TileWallpaper', type: REG_SZ, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Personalization', value: 'LockScreenImage', type: REG_SZ, data: 'C:\ArizenOS\Wallpapers\arizenOS_lockscreen.jpg'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Personalization', value: 'LockScreenOverlaysDisabled', type: REG_DWORD, data: '1'}
  - !powerShell:
      exeDir: true
      wait: true
      command: '& ".\Executables\wallpaper.ps1"'
