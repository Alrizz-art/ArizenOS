# entries/08-performance.yaml
# Phase: PERFORMANCE | Script: SCR-08
# OI-02 BLOCKER: [TBD_USERPREFERENCESMASK_WIN10] and [TBD_USERPREFERENCESMASK_WIN11]
# Replace with validated hex byte sequences from BRR §4.3 once OI-02 is resolved.

- !registryValueAction
  id: REG_VFX_CUSTOM
  name: "Set Visual Effects to Custom Profile"
  hive: HKCU
  path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects"
  value_name: "VisualFXSetting"
  value_type: REG_DWORD
  value_data: 3
  on_fail: log_and_continue

- !runScriptAction
  id: REG_USER_PREFS_MASK
  name: "Apply UserPreferencesMask (OS-conditional)"
  script: scripts/apply-performance.ps1
  args: ["-Action", "UserPrefsMask"]
  # Script detects OS build: < 22000 = WIN10 mask, >= 22000 = WIN11 mask
  # OI-02: both values are [TBD] in script source until blocker resolved
  on_fail: log_and_continue

- !registryValueAction
  id: REG_MENU_DELAY
  name: "Set Menu Delay to 200ms"
  hive: HKCU
  path: "Control Panel\\Desktop"
  value_name: "MenuShowDelay"
  value_type: REG_SZ
  value_data: "200"
  on_fail: log_and_continue

- !registryValueAction
  id: REG_DRAG_FULL
  name: "Show Window Contents While Dragging"
  hive: HKCU
  path: "Control Panel\\Desktop"
  value_name: "DragFullWindows"
  value_type: REG_SZ
  value_data: "1"
  on_fail: log_and_continue

- !registryValueAction
  id: REG_PREFETCH
  name: "Enable Prefetcher"
  hive: HKLM
  path: "SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters"
  value_name: "EnablePrefetcher"
  value_type: REG_DWORD
  value_data: 3
  on_fail: log_and_continue

- !registryValueAction
  id: REG_SUPERFETCH
  name: "Enable Superfetch (SysMain)"
  hive: HKLM
  path: "SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters"
  value_name: "EnableSuperfetch"
  value_type: REG_DWORD
  value_data: 3
  on_fail: log_and_continue
