# entries/03-asset-deploy.yaml
# Phase: ASSET_DEPLOY | Script: SCR-04

- !runScriptAction
  id: DIR_CREATE
  name: "Create ArizenOS Directories"
  script: scripts/deploy-assets.ps1
  args: ["-Action", "CreateDirs"]
  on_exit_1: abort
  creates_paths:
    - "%ProgramData%\\ArizenOS\\branding\\"
    - "%ProgramData%\\ArizenOS\\wallpapers\\"
    - "%APPDATA%\\ArizenOS\\logs\\"

- !copyFileAction
  id: COPY_OEM_LOGO
  name: "Deploy OEM Logo"
  source: "assets/logos/arizenOS_logo_oem.bmp"
  destination: "%ProgramData%\\ArizenOS\\branding\\oemlogo.bmp"
  overwrite: true
  critical: true
  # sha256_expected: "[TBD_SHA256_OEMLOGO]"  -- fill after OI-01 resolved
  on_fail: continue_with_error

- !copyFileAction
  id: COPY_WALLPAPER_DARK
  name: "Deploy Dark Wallpaper"
  source: "assets/wallpapers/arizenOS_dark.jpg"
  destination: "%ProgramData%\\ArizenOS\\wallpapers\\arizenOS_dark.jpg"
  overwrite: true
  critical: true
  # sha256_expected: "[TBD_SHA256_WALLPAPER_DARK]"
  on_fail: abort

- !copyFileAction
  id: COPY_WALLPAPER_DEFAULT
  name: "Deploy Default Wallpaper"
  source: "assets/wallpapers/arizenOS_default.jpg"
  destination: "%ProgramData%\\ArizenOS\\wallpapers\\arizenOS_default.jpg"
  overwrite: true
  critical: false
  on_fail: continue_with_warning

- !copyFileAction
  id: COPY_LOCKSCREEN
  name: "Deploy Lock Screen Wallpaper"
  source: "assets/wallpapers/arizenOS_lockscreen.jpg"
  destination: "%ProgramData%\\ArizenOS\\wallpapers\\arizenOS_lockscreen.jpg"
  overwrite: true
  critical: true
  # sha256_expected: "[TBD_SHA256_WALLPAPER_LOCKSCREEN]"
  on_fail: continue_with_error
