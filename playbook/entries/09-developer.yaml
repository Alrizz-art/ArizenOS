# entries/09-developer.yaml
# Phase: DEVELOPER (OPTIONAL) | Script: SCR-09
# Condition: user_opt_in_developer -- skipped if user did not select this option

- !conditionAction
  id: COND_DEV_OPT_IN
  condition: user_opt_in_developer
  on_false: skip_phase

- !messageAction
  id: MSG_DEV
  title: "Developer Setup"
  body: "Enabling Developer Mode, app sideloading, and long path support."
  button: "Apply"

- !registryKeyAction
  id: REG_DEV_KEY
  hive: HKLM
  path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\AppModelUnlock"
  action: create_if_absent

- !registryValueAction
  id: REG_DEV_MODE
  name: "Enable Developer Mode"
  hive: HKLM
  path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\AppModelUnlock"
  value_name: "AllowDevelopmentWithoutDevLicense"
  value_type: REG_DWORD
  value_data: 1
  on_fail: log_and_continue

- !registryValueAction
  id: REG_SIDELOAD
  name: "Enable App Sideloading"
  hive: HKLM
  path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\AppModelUnlock"
  value_name: "AllowAllTrustedApps"
  value_type: REG_DWORD
  value_data: 1
  on_fail: log_and_continue

- !registryValueAction
  id: REG_LONG_PATHS
  name: "Enable Long Path Support (>260 chars)"
  hive: HKLM
  path: "SYSTEM\\CurrentControlSet\\Control\\FileSystem"
  value_name: "LongPathsEnabled"
  value_type: REG_DWORD
  value_data: 1
  on_fail: log_and_continue
