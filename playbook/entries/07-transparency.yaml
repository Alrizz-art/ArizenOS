# entries/07-transparency.yaml
# Phase: TRANSPARENCY | Script: SCR-07 (DWM portion)
# Hive: HKCU\SOFTWARE\Microsoft\Windows\DWM

- !registryValueAction
  id: REG_AERO_PEEK
  name: "Enable Aero Peek"
  hive: HKCU
  path: "SOFTWARE\\Microsoft\\Windows\\DWM"
  value_name: "EnableAeroPeek"
  value_type: REG_DWORD
  value_data: 1
  on_fail: log_and_continue
  note: "Enables hover-to-peek taskbar thumbnails."

- !registryValueAction
  id: REG_LIVE_THUMBNAILS
  name: "Enable Live Taskbar Thumbnails"
  hive: HKCU
  path: "SOFTWARE\\Microsoft\\Windows\\DWM"
  value_name: "AlwaysHibernateThumbnails"
  value_type: REG_DWORD
  value_data: 0
  on_fail: log_and_continue
  note: "0 = render thumbnails live, not frozen."

- !registryValueAction
  id: REG_DWM_COMPOSITION
  name: "Enable DWM Composition"
  hive: HKCU
  path: "SOFTWARE\\Microsoft\\Windows\\DWM"
  value_name: "Composition"
  value_type: REG_DWORD
  value_data: 1
  on_fail: log_and_continue

- !registryValueAction
  id: REG_DWM_NO_ACCENT
  name: "Disable Accent Color on Title Bars"
  hive: HKCU
  path: "SOFTWARE\\Microsoft\\Windows\\DWM"
  value_name: "ColorPrevalence"
  value_type: REG_DWORD
  value_data: 0
  on_fail: log_and_continue
