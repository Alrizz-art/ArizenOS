# entries/05-lock-screen.yaml
# Phase: LOCK_SCREEN | Script: SCR-06
# Strategy: DUAL_PATH -- write both Policy + PersonalizationCSP on all OS versions
# OI-03 BLOCKER: paths contain [TBD] until OI-03 validation is complete

# Path 1: Policy (Win10 primary, also written on Win11)
- !registryKeyAction
  id: REG_LS_POLICY_KEY
  hive: HKLM
  path: "SOFTWARE\\Policies\\Microsoft\\Windows\\Personalization"
  action: create_if_absent

- !runScriptAction
  id: REG_LS_POLICY_IMAGE
  name: "Write Lock Screen Image -- Policy Path"
  script: scripts/apply-wallpaper.ps1
  args: ["-Action", "LockScreenPolicy"]
  # Writes expanded path to LockScreenImage
  # OI-03: effective path on Win10 = [TBD_WIN10_LOCKSCREEN_PATH]
  on_fail: log_and_continue

- !registryValueAction
  id: REG_LS_OVERLAYS_OFF
  hive: HKLM
  path: "SOFTWARE\\Policies\\Microsoft\\Windows\\Personalization"
  value_name: "LockScreenOverlaysDisabled"
  value_type: REG_DWORD
  value_data: 1
  on_fail: log_and_continue

# Path 2: PersonalizationCSP (Win11 primary, also written on Win10)
- !registryKeyAction
  id: REG_LS_CSP_KEY
  hive: HKLM
  path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\PersonalizationCSP"
  action: create_if_absent

- !runScriptAction
  id: REG_LS_CSP_PATH
  name: "Write Lock Screen Image -- PersonalizationCSP"
  script: scripts/apply-wallpaper.ps1
  args: ["-Action", "LockScreenCSP"]
  # Writes to LockScreenImagePath, LockScreenImageUrl, LockScreenImageStatus
  # OI-03: effective path on Win11 = [TBD_WIN11_LOCKSCREEN_PATH]
  on_fail: log_and_continue

- !runScriptAction
  id: GPUPDATE
  name: "Force Group Policy Refresh"
  script: scripts/apply-wallpaper.ps1
  args: ["-Action", "GpUpdate"]
  on_fail: log_warning
