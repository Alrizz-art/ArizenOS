schema_version: "1.0"
product: "ArizenOS"
version: "0.1.0"
generated: "2026-06-02"

# ═══════════════════════════════════════════════════════════════════════════════
# SAFETY: DO NOT TOUCH LIST
# These keys and services are explicitly excluded from the playbook.
# Any future entry that touches these areas must be rejected.
# ═══════════════════════════════════════════════════════════════════════════════
do_not_touch:
  services:
    - WinDefend          # Windows Defender — must remain running
    - wuauserv           # Windows Update — must remain running
    - BITS               # Background Intelligent Transfer — required by Windows Update
    - WpnService         # Windows Push Notifications — required for Update
    - wscsvc             # Windows Security Center
    - MpsSvc             # Windows Firewall
    - Dhcp               # DHCP Client — networking
    - Dnscache           # DNS Client — networking
    - NlaSvc             # Network Location Awareness
    - netprofm           # Network Profile Manager
  registry_hives:
    - HKLM\SYSTEM\CurrentControlSet\Services\WinDefend
    - HKLM\SYSTEM\CurrentControlSet\Services\WdFilter
    - HKLM\SOFTWARE\Microsoft\Windows Defender
    - HKLM\SOFTWARE\Policies\Microsoft\Windows Defender
    - HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate
    - HKLM\SYSTEM\CurrentControlSet\Services\wuauserv
    - HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\NetworkList
    - HKLM\SYSTEM\CurrentControlSet\Services\Tcpip
  features:
    - Microsoft Store (WSClient, WinStore)
    - Windows Recovery Environment
    - System Restore infrastructure
    - UAC core (HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\EnableLUA)

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1 — OEM BRANDING
# Status: ✅ VALIDATED (standard Win32 OEM path, unchanged since Windows 7)
# Hive: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation
# ═══════════════════════════════════════════════════════════════════════════════
oem_branding:
  hive: HKLM
  path: SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation
  create_key_if_absent: true
  validation_status: VALIDATED
  applies_to: [windows_10, windows_11]
  rollback: true   # backed up to registry-backup.reg before write

  values:
    - name: Manufacturer
      type: REG_SZ
      data: "ArizenOS"
      rollback_restore: true
      note: "Displays in System Properties → Computer Name and Settings → System → About"

    - name: Model
      type: REG_SZ
      data: "ArizenOS Experience Layer v0.1"
      rollback_restore: true

    - name: SupportURL
      type: REG_SZ
      data: "https://github.com/Alrizz-art/ArizenOS"
      rollback_restore: true
      note: "Clickable link in System Properties"

    - name: SupportPhone
      type: REG_SZ
      data: ""
      rollback_restore: true
      note: "Empty — not used in v0.1"

    - name: SupportHours
      type: REG_SZ
      data: ""
      rollback_restore: true
      note: "Empty — not used in v0.1"

    - name: Logo
      type: REG_SZ
      data: "%ProgramData%\ArizenOS\branding\oemlogo.bmp"
      rollback_restore: true
      expand_env: true   # path must be expanded at write time, not stored as REG_EXPAND_SZ
      note: "OEM logo — OI-01 must be resolved before this value is used in production"
      blocker: OI-01

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2 — THEME (DARK MODE)
# Status: ✅ VALIDATED (available since Windows 10 1903)
# Hive: HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize
# ═══════════════════════════════════════════════════════════════════════════════
theme:
  hive: HKCU
  path: SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize
  create_key_if_absent: false   # key always exists on supported OS versions
  validation_status: VALIDATED
  applies_to: [windows_10, windows_11]
  rollback: true

  values:
    - name: AppsUseLightTheme
      type: REG_DWORD
      data: 0x00000000
      rollback_restore: true
      note: "0 = dark apps. Default on clean install = 1 (light)"

    - name: SystemUsesLightTheme
      type: REG_DWORD
      data: 0x00000000
      rollback_restore: true
      note: "0 = dark taskbar, Start, system UI. Default = 1 (light)"

    - name: EnableTransparency
      type: REG_DWORD
      data: 0x00000001
      rollback_restore: true
      note: "1 = transparency on. Restores Windows default — most users have this ON"

    - name: ColorPrevalence
      type: REG_DWORD
      data: 0x00000000
      rollback_restore: true
      note: "0 = no accent color on taskbar/title bars. Cleaner look."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3 — DWM / COMPOSITOR
# Status: ✅ VALIDATED (DWM keys are standard, unchanged since Windows Vista)
# Hive: HKCU\SOFTWARE\Microsoft\Windows\DWM
# ═══════════════════════════════════════════════════════════════════════════════
dwm:
  hive: HKCU
  path: SOFTWARE\Microsoft\Windows\DWM
  create_key_if_absent: false
  validation_status: VALIDATED
  applies_to: [windows_10, windows_11]
  rollback: true

  values:
    - name: EnableAeroPeek
      type: REG_DWORD
      data: 0x00000001
      rollback_restore: true
      note: "Aero Peek (show desktop on taskbar hover) — enables smooth hover experience"

    - name: AlwaysHibernateThumbnails
      type: REG_DWORD
      data: 0x00000000
      rollback_restore: true
      note: "0 = live taskbar thumbnails rendered in real-time. More polished."

    - name: Composition
      type: REG_DWORD
      data: 0x00000001
      rollback_restore: true
      note: "DWM composition enabled. Should always be 1 on modern Windows."

    - name: ColorPrevalence
      type: REG_DWORD
      data: 0x00000000
      rollback_restore: true
      note: "0 = no accent color applied to title bars"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4 — VISUAL EFFECTS
# Status: ⚠️ PENDING — UserPreferencesMask awaiting OI-02 resolution
# Hive: HKCU\Control Panel\Desktop
# ═══════════════════════════════════════════════════════════════════════════════
visual_effects:
  validation_status: PENDING
  blockers: [OI-02]

  # Sub-section 4a — Desktop key
  desktop:
    hive: HKCU
    path: Control Panel\Desktop
    create_key_if_absent: false
    rollback: true

    values:
      - name: UserPreferencesMask
        type: REG_BINARY
        # ⚠️  PLACEHOLDER — DO NOT USE IN BUILD UNTIL OI-02 IS RESOLVED
        # Replace [TBD_USERPREFERENCESMASK_WIN10] and [TBD_USERPREFERENCESMASK_WIN11]
        # with validated hex byte sequences captured per BRR §4.3
        data_win10: "[TBD_USERPREFERENCESMASK_WIN10]"
        data_win11: "[TBD_USERPREFERENCESMASK_WIN11]"
        rollback_restore: true
        os_specific: true   # script must detect OS and apply correct value
        target_effects:
          animate_minimize_maximize: true
          smooth_font_edges: true
          show_thumbnails: true
          translucent_selection: true
          show_window_shadows: true
          show_pointer_shadows: true
          animate_controls: false
          fade_slide_menus: false
          fade_menu_items: false
        note: "⚠️ BLOCKER OI-02 — hex value must be captured from Windows GUI before use"

      - name: MenuShowDelay
        type: REG_SZ
        data: "200"
        rollback_restore: true
        note: "Faster menu response. Default is 400ms. 200ms is safe and noticeable."
        validation_status: VALIDATED

      - name: DragFullWindows
        type: REG_SZ
        data: "1"
        rollback_restore: true
        note: "Show window contents while dragging. Default = 1 on most installs."
        validation_status: VALIDATED

  # Sub-section 4b — VisualEffects key
  visual_fx_setting:
    hive: HKCU
    path: SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects
    create_key_if_absent: true
    rollback: true

    values:
      - name: VisualFXSetting
        type: REG_DWORD
        data: 0x00000003   # 3 = Custom
        rollback_restore: true
        note: "3 = Custom profile. Must be set alongside UserPreferencesMask."
        validation_status: VALIDATED

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5 — LOCK SCREEN
# Status: ⚠️ PENDING — OI-03 resolution required for confirmed dual-path strategy
# ═══════════════════════════════════════════════════════════════════════════════
lock_screen:
  validation_status: PENDING
  blockers: [OI-03]
  strategy: DUAL_PATH   # write both paths; each OS consumes what it supports
  note: >
    Option A (dual-path) is the proposed strategy from BRR §2 OI-03.
    Both path sets are written on all OS versions.
    Replace [TBD] placeholders once OI-03 testing confirms actual effective paths.

  # Sub-section 5a — Policy path (primary for Win10, also written on Win11)
  policy_path:
    hive: HKLM
    path: SOFTWARE\Policies\Microsoft\Windows\Personalization
    create_key_if_absent: true
    rollback: true
    applies_to: [windows_10, windows_11]

    values:
      - name: LockScreenImage
        type: REG_SZ
        # ⚠️  PLACEHOLDER — confirmed effective path on Win10 pending OI-03
        data: "[TBD_WIN10_LOCKSCREEN_PATH]"
        data_resolved: "%ProgramData%\ArizenOS\wallpapers\arizenOS_lockscreen.jpg"
        expand_env: true
        rollback_restore: true
        note: "⚠️ BLOCKER OI-03 — confirm this path is effective on Win10 22H2"

      - name: LockScreenOverlaysDisabled
        type: REG_DWORD
        data: 0x00000001
        rollback_restore: true
        note: "Disables Windows Spotlight tips/suggestions overlay on lock screen"
        validation_status: VALIDATED_EXPECTED   # standard policy key, no reason to doubt

  # Sub-section 5b — PersonalizationCSP path (primary for Win11, also written on Win10)
  personalization_csp:
    hive: HKLM
    path: SOFTWARE\Microsoft\Windows\CurrentVersion\PersonalizationCSP
    create_key_if_absent: true   # key may not exist by default — must be created
    rollback: true
    applies_to: [windows_10, windows_11]

    values:
      - name: LockScreenImagePath
        type: REG_SZ
        # ⚠️  PLACEHOLDER — confirmed effective path on Win11 pending OI-03
        data: "[TBD_WIN11_LOCKSCREEN_PATH]"
        data_resolved: "%ProgramData%\ArizenOS\wallpapers\arizenOS_lockscreen.jpg"
        expand_env: true
        rollback_restore: true
        note: "⚠️ BLOCKER OI-03 — confirm this path is effective on Win11 23H2"

      - name: LockScreenImageUrl
        type: REG_SZ
        data: "[TBD_WIN11_LOCKSCREEN_PATH]"
        data_resolved: "%ProgramData%\ArizenOS\wallpapers\arizenOS_lockscreen.jpg"
        expand_env: true
        rollback_restore: true

      - name: LockScreenImageStatus
        type: REG_DWORD
        data: 0x00000001
        rollback_restore: true
        note: "1 = activate the custom lock screen image"
        validation_status: VALIDATED_EXPECTED

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6 — PREFETCH / SUPERFETCH
# Status: ✅ VALIDATED (restores Windows defaults — safe on all target OS versions)
# Hive: HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\PrefetchParameters
# ═══════════════════════════════════════════════════════════════════════════════
prefetch:
  hive: HKLM
  path: SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\PrefetchParameters
  create_key_if_absent: false
  validation_status: VALIDATED
  applies_to: [windows_10, windows_11]
  rollback: true
  note: "Restores Windows defaults. SysMain service (Superfetch) must remain running."

  values:
    - name: EnablePrefetcher
      type: REG_DWORD
      data: 0x00000003   # 3 = app + boot prefetch
      rollback_restore: true

    - name: EnableSuperfetch
      type: REG_DWORD
      data: 0x00000003   # 3 = all superfetch features
      rollback_restore: true
      note: "SysMain service must not be stopped or disabled. This is a value-only write."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7 — DEVELOPER SETUP (OPTIONAL — user-prompted)
# Status: ✅ VALIDATED (standard dev mode keys, available since Win10 1607)
# Applied only if user selects developer setup during installation
# ═══════════════════════════════════════════════════════════════════════════════
developer_optional:
  validation_status: VALIDATED
  applies_to: [windows_10, windows_11]
  condition: user_selected_developer_setup   # only applied if user opts in
  rollback: true

  # Sub-section 7a — Developer Mode
  app_model_unlock:
    hive: HKLM
    path: SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock
    create_key_if_absent: true
    rollback: true

    values:
      - name: AllowDevelopmentWithoutDevLicense
        type: REG_DWORD
        data: 0x00000001
        rollback_restore: true
        rollback_data: 0x00000000
        note: "Enables Developer Mode. Rollback sets to 0."

      - name: AllowAllTrustedApps
        type: REG_DWORD
        data: 0x00000001
        rollback_restore: true
        rollback_data: 0x00000000
        note: "Enables sideloading of signed packages."

  # Sub-section 7b — Long Paths
  filesystem:
    hive: HKLM
    path: SYSTEM\CurrentControlSet\Control\FileSystem
    create_key_if_absent: false
    rollback: true

    values:
      - name: LongPathsEnabled
        type: REG_DWORD
        data: 0x00000001
        rollback_restore: true
        rollback_data: 0x00000000
        note: "Enables paths > 260 characters. Requires app manifest opt-in too."
