# ArizenOS v0.1 — Playbook Manifest (AME Wizard root entry point)
# Format: AME Wizard Playbook Schema v2
---
playbook:
  name: "ArizenOS"
  title: "ArizenOS Experience Layer"
  description: >
    ArizenOS v0.1 transforms a standard Windows 10/11 installation into
    an AI-first desktop environment. Applies branding, dark mode, transparency,
    and performance tuning. Fully reversible via built-in rollback.
  version: "0.1.0"
  channel: alpha
  author: "ArizenOS Contributors"
  repository: "https://github.com/Alrizz-art/ArizenOS"

  target:
    minimum_build: 19045
    maximum_build: null
    architectures: [x64]
    exclude: [windows_s_mode, arm64]

  requirements:
    elevation: true
    create_restore_point: true
    disk_space_mb: 500
    internet_required: false

  phases:
    - { id: PHASE_PREFLIGHT,    sequence: 1,  entry: entries/01-preflight.yaml,    abort_on_failure: true,  rollback_on_failure: false }
    - { id: PHASE_SAFETY_NET,   sequence: 2,  entry: entries/02-safety-net.yaml,   abort_on_failure: true,  rollback_on_failure: false }
    - { id: PHASE_ASSET_DEPLOY, sequence: 3,  entry: entries/03-asset-deploy.yaml, abort_on_failure: false, rollback_on_failure: true  }
    - { id: PHASE_OEM_BRANDING, sequence: 4,  entry: entries/04-oem-branding.yaml, abort_on_failure: false, rollback_on_failure: true  }
    - { id: PHASE_LOCK_SCREEN,  sequence: 5,  entry: entries/05-lock-screen.yaml,  abort_on_failure: false, rollback_on_failure: true  }
    - { id: PHASE_THEME,        sequence: 6,  entry: entries/06-theme.yaml,        abort_on_failure: false, rollback_on_failure: true  }
    - { id: PHASE_TRANSPARENCY, sequence: 7,  entry: entries/07-transparency.yaml, abort_on_failure: false, rollback_on_failure: true  }
    - { id: PHASE_PERFORMANCE,  sequence: 8,  entry: entries/08-performance.yaml,  abort_on_failure: false, rollback_on_failure: true  }
    - { id: PHASE_DEVELOPER,    sequence: 9,  entry: entries/09-developer.yaml,    abort_on_failure: false, rollback_on_failure: false, condition: user_opt_in_developer }
    - { id: PHASE_FINALIZE,     sequence: 10, entry: entries/10-finalize.yaml,     abort_on_failure: false, rollback_on_failure: false }

  rollback:
    trigger: manual
    also_trigger_on: fatal_error
    sequence: reverse
    entry: entries/rollback.yaml
    restore_point_prompt: true

  dependencies:
    PHASE_PREFLIGHT:    []
    PHASE_SAFETY_NET:   [PHASE_PREFLIGHT]
    PHASE_ASSET_DEPLOY: [PHASE_SAFETY_NET]
    PHASE_OEM_BRANDING: [PHASE_ASSET_DEPLOY]
    PHASE_LOCK_SCREEN:  [PHASE_ASSET_DEPLOY]
    PHASE_THEME:        [PHASE_SAFETY_NET]
    PHASE_TRANSPARENCY: [PHASE_SAFETY_NET]
    PHASE_PERFORMANCE:  [PHASE_SAFETY_NET]
    PHASE_DEVELOPER:    [PHASE_SAFETY_NET]
    PHASE_FINALIZE:     [PHASE_OEM_BRANDING, PHASE_LOCK_SCREEN, PHASE_THEME, PHASE_TRANSPARENCY, PHASE_PERFORMANCE]

  validation_hooks:
    - after: PHASE_OEM_BRANDING
      type: registry_read_back
      key: "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\OEMInformation"
      verify_values: [Manufacturer, Model, SupportURL, Logo]

    - after: PHASE_THEME
      type: registry_read_back
      key: "HKCU:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
      verify_values: [AppsUseLightTheme, SystemUsesLightTheme, EnableTransparency]

    - after: PHASE_PERFORMANCE
      type: registry_read_back
      key: "HKCU:\\Control Panel\\Desktop"
      verify_values: [UserPreferencesMask, MenuShowDelay]

    - after: PHASE_FINALIZE
      type: file_exists
      paths:
        - "%ProgramData%\\ArizenOS\\manifest.json"
        - "%APPDATA%\\ArizenOS\\backup\\registry-backup.reg"

  assets:   { manifest: "playbook/manifests/asset-manifest.yaml",   bundle_path: "assets/" }
  scripts:  { manifest: "playbook/manifests/script-manifest.yaml",  bundle_path: "scripts/" }
  registry: { manifest: "playbook/manifests/registry-manifest.yaml" }
