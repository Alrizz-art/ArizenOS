# ArizenOS v0.1 -- Script Integration Layer
# Maps SCR-01 through SCR-13 to phases, entry files, and validation hooks
schema_version: "1.0"
product: "ArizenOS"
version: "0.1.0"

install_phases:

  - phase: PHASE_PREFLIGHT
    entry_file: entries/01-preflight.yaml
    scripts:
      - id: SCR-01
        file: scripts/preflight-check.ps1
        invocations:
          - { action: CHK_OS_BUILD,  args: ["-Check","OsBuild","-MinBuild","19045"] }
          - { action: CHK_ELEVATION, args: ["-Check","Elevation"] }
          - { action: CHK_S_MODE,    args: ["-Check","SMode"] }
          - { action: CHK_DISK_HARD, args: ["-Check","DiskSpace","-MinMB","500"] }
          - { action: CHK_DOMAIN,    args: ["-Check","DomainJoined"] }
    validation: { type: exit_code, pass: [0,2], fail: [1] }

  - phase: PHASE_SAFETY_NET
    entry_file: entries/02-safety-net.yaml
    scripts:
      - { id: SCR-02, file: scripts/create-restore-point.ps1, action: RP_CREATE }
      - { id: SCR-03, file: scripts/backup-registry.ps1,      action: REG_BACKUP }
    validation:
      type: file_exists
      paths: ["%APPDATA%\\ArizenOS\\backup\\registry-backup.reg"]

  - phase: PHASE_ASSET_DEPLOY
    entry_file: entries/03-asset-deploy.yaml
    scripts:
      - { id: SCR-04, file: scripts/deploy-assets.ps1, action: DIR_CREATE }
    validation:
      type: file_exists
      paths:
        - "%ProgramData%\\ArizenOS\\branding\\oemlogo.bmp"
        - "%ProgramData%\\ArizenOS\\wallpapers\\arizenOS_dark.jpg"
        - "%ProgramData%\\ArizenOS\\wallpapers\\arizenOS_lockscreen.jpg"

  - phase: PHASE_OEM_BRANDING
    entry_file: entries/04-oem-branding.yaml
    scripts:
      - id: SCR-05
        file: scripts/apply-oem-branding.ps1
        invocations:
          - { action: REG_OEM_LOGO, args: ["-Action","WriteLogo"] }
          - { action: VERIFY_OEM,   args: ["-Action","Verify"] }
    validation:
      type: registry_read_back
      key: "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\OEMInformation"
      values: [Manufacturer, Model, SupportURL, Logo]

  - phase: PHASE_LOCK_SCREEN
    entry_file: entries/05-lock-screen.yaml
    blockers: [OI-03]
    scripts:
      - id: SCR-06
        file: scripts/apply-wallpaper.ps1
        invocations:
          - { action: REG_LS_POLICY_IMAGE, args: ["-Action","LockScreenPolicy"] }
          - { action: REG_LS_CSP_PATH,     args: ["-Action","LockScreenCSP"] }
          - { action: GPUPDATE,            args: ["-Action","GpUpdate"] }
    validation:
      type: registry_read_back
      key: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\Personalization"
      values: [LockScreenImage]

  - phase: PHASE_THEME
    entry_file: entries/06-theme.yaml
    scripts:
      - id: SCR-07
        file: scripts/apply-theme.ps1
        invocations:
          - { action: SET_WALLPAPER, args: ["-Action","SetDesktopWallpaper","-Asset","arizenOS_dark.jpg"] }
          - { action: VERIFY_THEME,  args: ["-Action","Verify"] }
    validation:
      type: registry_read_back
      key: "HKCU:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
      values: [AppsUseLightTheme, SystemUsesLightTheme, EnableTransparency]

  - phase: PHASE_TRANSPARENCY
    entry_file: entries/07-transparency.yaml
    scripts:
      - { id: SCR-07, file: scripts/apply-theme.ps1, note: "DWM portion of SCR-07" }
    validation:
      type: registry_read_back
      key: "HKCU:\\SOFTWARE\\Microsoft\\Windows\\DWM"
      values: [EnableAeroPeek, AlwaysHibernateThumbnails, Composition]

  - phase: PHASE_PERFORMANCE
    entry_file: entries/08-performance.yaml
    blockers: [OI-02]
    scripts:
      - { id: SCR-08, file: scripts/apply-performance.ps1, action: REG_USER_PREFS_MASK }
    validation:
      type: registry_read_back
      key: "HKCU:\\Control Panel\\Desktop"
      values: [UserPreferencesMask, MenuShowDelay]

  - phase: PHASE_DEVELOPER
    entry_file: entries/09-developer.yaml
    condition: user_opt_in_developer
    scripts:
      - { id: SCR-09, file: scripts/apply-developer.ps1 }
    validation:
      type: registry_read_back
      key: "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\AppModelUnlock"
      values: [AllowDevelopmentWithoutDevLicense]

  - phase: PHASE_FINALIZE
    entry_file: entries/10-finalize.yaml
    scripts:
      - { id: SCR-10, file: scripts/write-manifest.ps1,    action: WRITE_MANIFEST }
      - { id: SCR-11, file: scripts/register-rollback.ps1, action: REGISTER_ROLLBACK }
      - { id: SCR-12, file: scripts/finalize.ps1,          action: FINALIZE_LOG }
    validation:
      type: file_exists
      paths: ["%ProgramData%\\ArizenOS\\manifest.json"]

rollback_phases:
  - phase: ROLLBACK
    entry_file: entries/rollback.yaml
    scripts:
      - id: SCR-13
        file: scripts/rollback.ps1
        invocations:
          - { action: VERIFY_BACKUP, args: ["-Action","VerifyBackup"] }
          - { action: IMPORT_BACKUP, args: ["-Action","ImportRegistry"] }
          - { action: REMOVE_ASSETS, args: ["-Action","RemoveAssets"] }
          - { action: REVERT_DEV,    args: ["-Action","RevertDeveloper"] }
          - { action: CLEANUP,       args: ["-Action","Cleanup"] }

summary:
  SCR-01: { phase: PHASE_PREFLIGHT,    entry: entries/01-preflight.yaml }
  SCR-02: { phase: PHASE_SAFETY_NET,   entry: entries/02-safety-net.yaml }
  SCR-03: { phase: PHASE_SAFETY_NET,   entry: entries/02-safety-net.yaml }
  SCR-04: { phase: PHASE_ASSET_DEPLOY, entry: entries/03-asset-deploy.yaml }
  SCR-05: { phase: PHASE_OEM_BRANDING, entry: entries/04-oem-branding.yaml }
  SCR-06: { phase: PHASE_LOCK_SCREEN,  entry: entries/05-lock-screen.yaml }
  SCR-07: { phase: PHASE_THEME,        entry: entries/06-theme.yaml, also: entries/07-transparency.yaml }
  SCR-08: { phase: PHASE_PERFORMANCE,  entry: entries/08-performance.yaml }
  SCR-09: { phase: PHASE_DEVELOPER,    entry: entries/09-developer.yaml }
  SCR-10: { phase: PHASE_FINALIZE,     entry: entries/10-finalize.yaml }
  SCR-11: { phase: PHASE_FINALIZE,     entry: entries/10-finalize.yaml }
  SCR-12: { phase: PHASE_FINALIZE,     entry: entries/10-finalize.yaml }
  SCR-13: { phase: ROLLBACK,           entry: entries/rollback.yaml }
