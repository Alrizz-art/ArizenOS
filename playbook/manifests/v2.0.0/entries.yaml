# ============================================================
# ArizenOS — Entry Index Manifest
# AME Wizard Playbook Execution Order & Conditions
# Version: 2.0.0
# ============================================================
#
# This file defines the full installation pipeline:
#   - Execution order of all phases
#   - Per-entry conditions (user config + OS build)
#   - Error handling strategy per phase
#   - Rollback hooks on failure
#   - Win10 vs Win11 divergence points
#
# Referenced by: playbook.yaml via !include entries.yaml
# ============================================================

entries:

  # ──────────────────────────────────────────────────────────
  # PHASE 0 — PREFLIGHT & SAFETY
  # Always runs. No conditions. Cannot be skipped.
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/scripts/build/restore-point.yaml
      id: phase-0-restore-point
      required: true
      onError: abort
      description: >
        Creates a System Restore Point and backs up all registry keys
        that will be modified. If this phase fails (e.g., System Protection
        is disabled), installation aborts with instructions to enable it.
      errorMessage: >
        Failed to create System Restore Point.
        Enable System Protection on C: drive and retry.
        (Control Panel → System → System Protection → Configure → Enable)

  # ──────────────────────────────────────────────────────────
  # PHASE 1 — OEM BRANDING
  # Condition: {{OEMBranding}} == true
  # Win10 / Win11: identical behavior
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/registry/tweaks/ux/oem-branding.yaml
      id: phase-1-oem-branding
      required: false
      condition: "{{OEMBranding}}"
      onError: warn
      rollbackOnFailure: false
      description: >
        Applies ArizenOS identity to OEMInformation registry, System Info page,
        About page, and content delivery manager. Non-critical — a failure here
        is logged as a warning and installation continues.

  # ──────────────────────────────────────────────────────────
  # PHASE 2a — DARK THEME
  # Condition: always (core feature)
  # Win10: applies to taskbar + apps via Personalize keys
  # Win11: additionally activates Mica via EnableMicaEffect
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/registry/tweaks/ux/dark-theme.yaml
      id: phase-2a-dark-theme
      required: true
      onError: warn
      windowsBuilds:
        # Windows 10 22H2 (19045) — full support
        - minBuild: 19045
          maxBuild: 21999
          notes: "Acrylic taskbar via UseOLEDTaskbarTransparency. No Mica support."
        # Windows 11 22H2 (22621) through 24H2 (26100)
        - minBuild: 22000
          maxBuild: 99999
          notes: "Mica effect enabled via EnableMicaEffect=1. Full DWM acrylic stack."
      description: >
        Forces system-wide dark mode. Sets ArizenOS deep slate accent color.
        Applies custom visual FX bitmask for performance-balanced rendering.

  # ──────────────────────────────────────────────────────────
  # PHASE 2b — TRANSPARENCY
  # Condition: always (core feature)
  # Win10: Acrylic blur via DWM Composition
  # Win11: Mica + Acrylic via ImmersiveShell
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/registry/tweaks/ux/transparency.yaml
      id: phase-2b-transparency
      required: true
      dependsOn: phase-2a-dark-theme
      onError: warn
      windowsBuilds:
        - minBuild: 19045
          maxBuild: 21999
          notes: "Acrylic blur via DWM Composition + ColorizationBlurBalance."
        - minBuild: 22000
          maxBuild: 99999
          notes: "UseAcrylicSurface + EnableMicaEffect for full Win11 material stack."
      description: >
        Enables transparency and blur effects across all shell surfaces.
        Must run after dark-theme to ensure DWM accent keys are already set.

  # ──────────────────────────────────────────────────────────
  # PHASE 3 — SAFE DEBLOAT
  # Condition: always (security-critical)
  # Debloat level controlled by {{DebloatLevel}} config option
  # Win10 / Win11: same AppX targets; Win11 adds GamingApp, Clipchamp
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/registry/tweaks/debloat/debloat.yaml
      id: phase-3-debloat
      required: true
      onError: warn
      rollbackOnFailure: false
      windowsBuilds:
        - minBuild: 19045
          maxBuild: 21999
          skipActions:
            - "Clipchamp.Clipchamp"     # Not present on Win10
            - "Microsoft.GamingApp"     # Win11 only
          notes: "Win10: skips Win11-exclusive apps automatically."
        - minBuild: 22000
          maxBuild: 99999
          notes: "Win11: all targets including GamingApp and Clipchamp."
      description: >
        Removes telemetry services, advertising registry keys, scheduled
        telemetry tasks, and non-essential AppX packages.
        Protected list enforced: Store, WinGet, VCLibs, UI.Xaml are never removed.

  # ──────────────────────────────────────────────────────────
  # PHASE 4 — WALLPAPER
  # Condition: {{Wallpaper}} == true
  # Win10 / Win11: identical — Win32 SystemParametersInfo API
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/registry/tweaks/ux/wallpaper.yaml
      id: phase-4-wallpaper
      required: false
      condition: "{{Wallpaper}}"
      onError: warn
      rollbackOnFailure: false
      description: >
        Deploys ArizenOS branded wallpapers to C:\ArizenOS\Wallpapers\.
        Sets desktop via HKCU\Control Panel\Desktop and lock screen via
        Group Policy Personalization key. Non-critical — skipped gracefully
        if assets are missing.

  # ──────────────────────────────────────────────────────────
  # PHASE 5 — DEVELOPER ENVIRONMENT
  # Condition: {{DeveloperMode}} == true
  # Win10: WSL2 via Optional Features (requires reboot)
  # Win11: WSL2 also available via wsl --install (preferred)
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/registry/packages/optional/developer-setup.yaml
      id: phase-5-developer-setup
      required: false
      condition: "{{DeveloperMode}}"
      onError: warn
      rollbackOnFailure: false
      timeout: 1800
      windowsBuilds:
        - minBuild: 19045
          maxBuild: 21999
          notes: >
            Win10: WSL2 enabled via Enable-WindowsOptionalFeature.
            Reboot required before wsl --install ubuntu can run.
            WinGet installed via DesktopAppInstaller if not present.
        - minBuild: 22000
          maxBuild: 99999
          notes: >
            Win11: WSL2 can be installed in one step via wsl --install.
            WinGet pre-installed on clean Win11 builds.
      description: >
        Installs WSL2, Hyper-V, and 10 developer packages via WinGet.
        Configures Git globals, PowerShell 7 profile, Windows Terminal
        ArizenOS color scheme, and developer registry tweaks.
        Timeout: 1800s (30 min) to allow WinGet downloads to complete.

  # ──────────────────────────────────────────────────────────
  # PHASE 6 — FINALIZE & CLEANUP
  # Always runs. Runs last regardless of previous phase outcomes.
  # ──────────────────────────────────────────────────────────
  - !include:
      path: playbook/registry/tweaks/ux/final-cleanup.yaml
      id: phase-6-final-cleanup
      required: true
      runAlways: true
      onError: warn
      description: >
        Applies performance registry tweaks, runs security audit,
        restarts Windows Explorer to activate theme, archives all
        install logs to a timestamped ZIP, and displays the final
        summary with reboot prompt.

# ============================================================
# ERROR HANDLING POLICY
# ============================================================
errorPolicy:
  # abort  — stop installation immediately, prompt user to rollback
  # warn   — log error, continue to next phase
  # retry  — retry the action up to retryCount times before warn
  defaults:
    onError: warn
    retryCount: 2
    retryDelaySeconds: 3

  # Phases that MUST succeed or the whole installation aborts
  criticalPhases:
    - phase-0-restore-point

  # Phases where partial success is acceptable
  bestEffortPhases:
    - phase-1-oem-branding
    - phase-4-wallpaper
    - phase-5-developer-setup

# ============================================================
# ROLLBACK HOOKS
# ============================================================
rollback:
  # Automatic rollback trigger: only on critical phase failure
  autoRollback:
    enabled: false
    triggerOn: criticalPhases
    method: RestorePoint
    message: >
      Critical phase failed. Initiating automatic rollback to
      'ArizenOS Pre-Install' restore point. This will restart your system.

  # Manual rollback instructions shown at end of install log
  manualRollback:
    full: "powershell -ExecutionPolicy Bypass .\\scripts\\rollback.ps1 -Full"
    registryOnly: "powershell -ExecutionPolicy Bypass .\\scripts\\rollback.ps1 -RestoreRegistry"
    restorePoint: "powershell -ExecutionPolicy Bypass .\\scripts\\rollback.ps1 -UseRestorePoint"

# ============================================================
# WINDOWS BUILD COMPATIBILITY MATRIX
# ============================================================
compatibility:
  windows10:
    minBuild: 19045          # 22H2 — minimum supported
    maxBuild: 21999
    testedBuilds:
      - 19045                # 22H2
    knownIssues:
      - "Mica effects not available (Win11 only) — falls back to Acrylic"
      - "wsl --install not available — uses Enable-WindowsOptionalFeature"
      - "Clipchamp and GamingApp not present — skipped automatically"

  windows11:
    minBuild: 22000          # 21H2 (initial release)
    maxBuild: 99999
    testedBuilds:
      - 22621                # 22H2
      - 22631                # 23H2
      - 26100                # 24H2
    knownIssues:
      - "Taskbar transparency on Win11 24H2 requires ExplorerPatcher for full effect"
      - "Start menu color may require sign-out/sign-in cycle to apply"

# ============================================================
# POST-INSTALL ACTIONS
# ============================================================
postInstall:
  rebootRequired: true
  rebootDelay: 30
  rebootMessage: >
    ArizenOS has been applied successfully.
    A reboot is required to complete WSL2 activation and
    finalize all theme changes. Reboot now? (recommended)
  showSummaryLog: true
  summaryLogPath: "%SystemDrive%\\ArizenOS\\Logs\\install.log"
