name: security_audit
version: "1.0.0"
description: "Full security audit: code scan, dependency audit, permissions check, and remediation report."
author: commander
tags: [security, audit, compliance]

trigger:
  type: manual

inputs:
  target:
    type: string
    required: false
    default: "."
    description: "Directory or file to audit (default: entire repo)"
  depth:
    type: string
    required: false
    default: full
    enum: [quick, full, paranoid]
    description: "Audit depth — quick (scan only), full (scan + deps), paranoid (everything)"
  generate_report:
    type: boolean
    required: false
    default: true
    description: "Generate a detailed Markdown report"

steps:
  - id: recall_previous_audits
    name: "Load previous audit findings from memory"
    agent: memory
    tool: memory.query
    inputs:
      query: "security audit findings vulnerabilities {{ inputs.target }}"
      scope: persistent
      limit: 5
    on_failure: continue
    output_var: audit_history
    priority: 3
    timeout_sec: 10

  - id: code_scan
    name: "Static code security scan"
    agent: security
    tool: security.scan
    inputs:
      target: "{{ inputs.target }}"
      context: "Previous findings: {{ steps.recall_previous_audits.output }}"
    depends_on: [recall_previous_audits]
    output_var: code_findings
    priority: 10
    timeout_sec: 120
    retry:
      max_attempts: 2
      backoff: fixed
      delay_sec: 3

  - id: dependency_audit
    name: "Dependency vulnerability audit"
    agent: security
    tool: security.audit
    inputs:
      target: "{{ inputs.target }}"
    depends_on: [recall_previous_audits]
    parallel_with: [code_scan]
    condition: "{{ inputs.depth in ['full', 'paranoid'] }}"
    output_var: dep_findings
    priority: 9
    timeout_sec: 180
    on_failure: continue
    retry:
      max_attempts: 2
      backoff: exponential
      delay_sec: 5

  - id: process_audit
    name: "Running process + service audit"
    agent: devops
    tool: devops.monitor
    inputs:
      query: "List all running ArizenOS processes and services, check for anomalies"
    depends_on: [recall_previous_audits]
    parallel_with: [code_scan, dependency_audit]
    condition: "{{ inputs.depth == 'paranoid' }}"
    output_var: process_status
    priority: 7
    timeout_sec: 30
    on_failure: continue

  - id: research_cves
    name: "Research CVEs for discovered vulnerabilities"
    agent: researcher
    tool: research.web
    inputs:
      query: "CVE remediation for {{ steps.dependency_audit.output }}"
      mode: hybrid
    depends_on: [dependency_audit]
    condition: "{{ inputs.depth in ['full', 'paranoid'] and steps.dependency_audit.output.findings | length > 0 }}"
    output_var: cve_research
    priority: 6
    timeout_sec: 60
    on_failure: continue

  - id: generate_report
    name: "Generate remediation report"
    agent: coder
    tool: code.generate
    inputs:
      query: >
        Generate a detailed security audit report in Markdown.
        Code findings: {{ steps.code_findings.output }}
        Dependency findings: {{ steps.dep_findings.output }}
        Process status: {{ steps.process_status.output }}
        CVE research: {{ steps.cve_research.output }}
        Format: executive summary, critical findings, full findings table, remediation checklist.
      file_path: "docs/security/audit-{{ now() }}.md"
      language: markdown
    depends_on: [code_scan, dependency_audit, research_cves]
    condition: "{{ inputs.generate_report == true }}"
    output_var: report_result
    priority: 5
    timeout_sec: 90
    on_failure: continue

  - id: store_audit
    name: "Store audit results in memory"
    agent: memory
    tool: memory.store
    inputs:
      content: >
        Security Audit:
        Target: {{ inputs.target }}
        Depth: {{ inputs.depth }}
        Code findings: {{ steps.code_findings.output.findings | length }} issues
        Score: {{ steps.code_findings.output.score }}
        Deps: {{ steps.dep_findings.output.findings | length }} vulnerabilities
        Report: {{ steps.generate_report.output.file_path }}
      scope: persistent
      source: playbook.security_audit
      tags: [security, audit, "{{ inputs.depth }}"]
    depends_on: [code_scan, dependency_audit]
    priority: 2
    timeout_sec: 15

checkpoints:
  - after: code_scan
    scope: all
    ttl_sec: 7200
  - after: dependency_audit
    scope: outputs

on_error:
  action: abort
  notify: true
  rollback: false

observability:
  log_level: info
  emit_events: true
  hud_overlay: true

timeout_sec: 900
