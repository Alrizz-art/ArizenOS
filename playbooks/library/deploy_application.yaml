name: deploy_application
version: "1.0.0"
description: "Build, test, security-check, and deploy an ArizenOS application component."
author: commander
tags: [deployment, ci, release, devops]

trigger:
  type: manual

inputs:
  target:
    type: string
    required: true
    enum: [daemon, ui, agents, all]
    description: "Which component to deploy"
  environment:
    type: string
    required: false
    default: development
    enum: [development, staging, production]
    description: "Deployment target environment"
  skip_tests:
    type: boolean
    required: false
    default: false
    description: "Skip test suite (emergency deploys only)"
  dry_run:
    type: boolean
    required: false
    default: false
    description: "Show what would happen without executing"

steps:
  - id: pre_flight_check
    name: "Pre-flight security and status check"
    agent: security
    tool: security.scan
    inputs:
      target: "."
    output_var: security_status
    priority: 10
    timeout_sec: 90
    on_failure: abort

  - id: run_ci
    name: "Full CI pipeline"
    agent: devops
    tool: devops.ci
    inputs:
      target: "{{ inputs.target }}"
      query: "Run full CI for {{ inputs.target }}"
    depends_on: [pre_flight_check]
    condition: "{{ inputs.skip_tests == false }}"
    output_var: ci_result
    priority: 9
    timeout_sec: 300
    on_failure: abort
    retry:
      max_attempts: 2
      backoff: fixed
      delay_sec: 10

  - id: build
    name: "Production build"
    agent: devops
    tool: devops.build
    inputs:
      target: "{{ inputs.target }}"
    depends_on: [run_ci]
    output_var: build_result
    priority: 9
    timeout_sec: 300
    on_failure: abort
    retry:
      max_attempts: 2
      backoff: exponential
      delay_sec: 5

  - id: validate_build
    name: "Validate build artifacts"
    agent: security
    tool: security.scan
    inputs:
      target: "build/"
      context: "Validate the production build for security issues before deploy"
    depends_on: [build]
    output_var: build_security
    priority: 8
    timeout_sec: 60
    on_failure: abort

  - id: deploy
    name: "Deploy to {{ inputs.environment }}"
    agent: devops
    tool: devops.deploy
    inputs:
      target: "{{ inputs.target }}"
      environment: "{{ inputs.environment }}"
      dry_run: "{{ inputs.dry_run }}"
      build_artifact: "{{ steps.build.output.artifact_path }}"
    depends_on: [build, validate_build]
    condition: "{{ inputs.dry_run == false }}"
    approval:
      required: true
      message: >
        Deploy {{ inputs.target }} to {{ inputs.environment }}?
        Build: {{ steps.build.output.success }}
        CI: {{ steps.run_ci.output.passed }}
        Security: CLEAN
      timeout_sec: 300
    output_var: deploy_result
    priority: 10
    timeout_sec: 600
    on_failure: rollback
    retry:
      max_attempts: 1
      backoff: fixed
      delay_sec: 0

  - id: post_deploy_check
    name: "Post-deploy health check"
    agent: devops
    tool: devops.monitor
    inputs:
      target: "{{ inputs.target }}"
      query: "Verify {{ inputs.target }} is healthy after deploy"
    depends_on: [deploy]
    output_var: health_status
    priority: 9
    timeout_sec: 60
    on_failure: continue

  - id: store_release
    name: "Store release record in memory"
    agent: memory
    tool: memory.store
    inputs:
      content: >
        Deployment Record:
        Target: {{ inputs.target }}
        Environment: {{ inputs.environment }}
        Build success: {{ steps.build.output.success }}
        CI passed: {{ steps.run_ci.output.passed }}
        Deploy time: {{ now() }}
        Health: {{ steps.post_deploy_check.output }}
      scope: persistent
      source: playbook.deploy_application
      tags: [deployment, release, "{{ inputs.target }}", "{{ inputs.environment }}"]
    depends_on: [post_deploy_check]
    priority: 2
    timeout_sec: 15

rollback_steps:
  - id: rollback_service
    agent: devops
    tool: devops.service
    inputs:
      action: restart
      service_name: ArizenDaemon
      reason: "Rollback triggered by failed deployment"

checkpoints:
  - after: build
    scope: all
    ttl_sec: 3600
  - after: deploy
    scope: outputs

on_error:
  action: abort
  notify: true
  rollback: true

observability:
  log_level: info
  emit_events: true
  trace_inputs: false
  hud_overlay: true

timeout_sec: 1800
