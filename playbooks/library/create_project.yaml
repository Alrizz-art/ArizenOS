name: create_project
version: "1.0.0"
description: "Scaffold a new software project — structure, tests, security scan, and memory storage."
author: commander
tags: [development, scaffold, onboarding]

trigger:
  type: manual

inputs:
  project_name:
    type: string
    required: true
    description: "Name of the new project (used as directory name)"
    pattern: "^[a-z][a-z0-9_-]*$"
  language:
    type: string
    required: false
    default: python
    enum: [python, rust, typescript]
    description: "Primary language for the project"
  with_tests:
    type: boolean
    required: false
    default: true
    description: "Generate an initial test suite"
  with_docs:
    type: boolean
    required: false
    default: true
    description: "Generate a README and docs skeleton"

steps:
  - id: recall_prior_projects
    name: "Check memory for related projects"
    agent: memory
    tool: memory.query
    inputs:
      query: "project {{ inputs.project_name }} {{ inputs.language }}"
      limit: 3
      scope: persistent
    on_failure: continue
    output_var: prior_knowledge
    priority: 3
    timeout_sec: 10

  - id: scaffold_structure
    name: "Generate project scaffold"
    agent: coder
    tool: code.generate
    inputs:
      query: >
        Create a complete {{ inputs.language }} project scaffold for '{{ inputs.project_name }}'.
        Include: directory layout, main entry point, config files, .gitignore, pyproject.toml / Cargo.toml / package.json as appropriate.
        Prior context: {{ steps.recall_prior_projects.output }}
      language: "{{ inputs.language }}"
      file_path: "{{ inputs.project_name }}/main.{{ 'py' if inputs.language == 'python' else ('rs' if inputs.language == 'rust' else 'ts') }}"
    depends_on: [recall_prior_projects]
    output_var: scaffold_result
    priority: 9
    timeout_sec: 120
    retry:
      max_attempts: 2
      backoff: exponential
      delay_sec: 3

  - id: generate_tests
    name: "Generate initial test suite"
    agent: coder
    tool: code.test
    inputs:
      query: "Generate comprehensive tests for the {{ inputs.language }} project '{{ inputs.project_name }}'"
      context: "{{ steps.scaffold_structure.output }}"
    depends_on: [scaffold_structure]
    condition: "{{ inputs.with_tests == true }}"
    output_var: test_result
    priority: 7
    timeout_sec: 90
    on_failure: skip

  - id: security_scan
    name: "Initial security scan"
    agent: security
    tool: security.scan
    inputs:
      target: "{{ inputs.project_name }}"
    depends_on: [scaffold_structure]
    parallel_with: [generate_tests]
    output_var: security_result
    priority: 8
    timeout_sec: 60
    on_failure: continue

  - id: generate_docs
    name: "Generate README and docs"
    agent: coder
    tool: code.generate
    inputs:
      query: >
        Generate a README.md for '{{ inputs.project_name }}' ({{ inputs.language }} project).
        Include: overview, installation, usage, project structure, contributing guide.
      file_path: "{{ inputs.project_name }}/README.md"
      context: "{{ steps.scaffold_structure.output }}"
    depends_on: [scaffold_structure]
    condition: "{{ inputs.with_docs == true }}"
    parallel_with: [generate_tests, security_scan]
    output_var: docs_result
    priority: 5
    timeout_sec: 60
    on_failure: skip

  - id: store_in_memory
    name: "Store project knowledge in memory"
    agent: memory
    tool: memory.store
    inputs:
      content: >
        Project: {{ inputs.project_name }}
        Language: {{ inputs.language }}
        Scaffold: {{ steps.scaffold_structure.output }}
        Security: {{ steps.security_scan.output }}
      scope: persistent
      source: playbook.create_project
      tags: [project, "{{ inputs.language }}", "{{ inputs.project_name }}"]
    depends_on: [scaffold_structure, security_scan]
    priority: 3
    timeout_sec: 15

checkpoints:
  - after: scaffold_structure
    scope: all
    ttl_sec: 86400
  - after: generate_tests
    scope: outputs

on_error:
  action: abort
  notify: true
  rollback: false

observability:
  log_level: info
  emit_events: true
  metrics: [duration, token_usage, step_count]
  hud_overlay: true

timeout_sec: 600
