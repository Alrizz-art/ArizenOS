syntax = "proto3";
package arizen.v1;

option java_package = "os.arizen.v1";

// ── Daemon Service ─────────────────────────────────────────────────────────

service Daemon {
  rpc GetStatus    (Empty)           returns (DaemonStatus);
  rpc ListAgents   (Empty)           returns (AgentList);
  rpc GetAgent     (AgentId)         returns (AgentInfo);
  rpc SendTask     (TaskRequest)     returns (TaskHandle);
  rpc CancelTask   (TaskHandle)      returns (Ack);
  rpc StreamEvents (EventFilter)     returns (stream Event);
  rpc HealthCheck  (Empty)           returns (HealthResponse);
}

// ── Agent Mesh Service ─────────────────────────────────────────────────────

service AgentMesh {
  rpc DelegateTask   (DelegationRequest) returns (stream TaskUpdate);
  rpc GetAgentStatus (AgentId)           returns (AgentStatus);
  rpc SetAgentConfig (AgentConfig)       returns (Ack);
  rpc ListTools      (AgentId)           returns (ToolList);
}

// ── Knowledge Service ──────────────────────────────────────────────────────

service KnowledgeService {
  rpc Query           (KnowledgeQuery)   returns (KnowledgeResults);
  rpc Ingest          (IngestRequest)    returns (IngestResult);
  rpc ListNamespaces  (Empty)            returns (NamespaceList);
}

// ── Messages ───────────────────────────────────────────────────────────────

message Empty {}

message Ack {
  bool    success = 1;
  string  error   = 2;
}

message AgentId { string id = 1; }

message DaemonStatus {
  string  version    = 1;
  string  state      = 2;    // booting | ready | degraded | shutdown
  int64   uptime_ms  = 3;
  int32   agent_count = 4;
}

message AgentInfo {
  string  id          = 1;
  string  name        = 2;
  string  status      = 3;   // idle | busy | error | stopped
  string  version     = 4;
  int64   pid         = 5;
}

message AgentList { repeated AgentInfo agents = 1; }

message AgentStatus {
  string  agent_id   = 1;
  string  status     = 2;
  float   cpu_pct    = 3;
  int64   mem_bytes  = 4;
}

message AgentConfig {
  string         agent_id   = 1;
  bytes          config_toml = 2;
}

message TaskRequest {
  string  query         = 1;
  string  target_agent  = 2;    // empty = Monarch decides
  map<string, string> context = 3;
}

message TaskHandle { string task_id = 1; }

message TaskUpdate {
  string  task_id  = 1;
  string  status   = 2;   // planning | running | waiting_approval | complete | failed
  string  token    = 3;   // streaming token (empty if status update)
  bool    done     = 4;
  string  error    = 5;
}

message DelegationRequest {
  string  task_id     = 1;
  string  agent       = 2;
  string  tool        = 3;
  bytes   inputs_msgpack = 4;
}

message ToolList { repeated string tools = 1; }

message EventFilter { repeated string event_types = 1; }

message Event {
  string  type       = 1;
  string  source     = 2;
  int64   timestamp  = 3;
  bytes   payload    = 4;
}

message KnowledgeQuery {
  string  query       = 1;
  string  namespace   = 2;
  int32   top_k       = 3;
}

message KnowledgeResult {
  string  chunk_id    = 1;
  string  text        = 2;
  string  source      = 3;
  float   score       = 4;
}

message KnowledgeResults { repeated KnowledgeResult results = 1; }

message IngestRequest {
  string  path        = 1;
  string  namespace   = 2;
}

message IngestResult {
  int32   chunks      = 1;
  bool    success     = 2;
}

message NamespaceList { repeated string namespaces = 1; }

message HealthResponse {
  bool    healthy       = 1;
  bool    lm_studio_ok  = 2;
  bool    agents_ok     = 3;
  bool    knowledge_ok  = 4;
  string  details       = 5;
}
